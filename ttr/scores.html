<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log a Game — Ticket to Ride 🚂</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a0a05; --bg2: #231009; --bg3: #2e1510;
      --border: rgba(255,200,100,0.15); --text: #f5e6d3; --muted: #a08060;
      --accent: #e8963c; --accent2: #d64a2a; --card: #271208;
      --input-bg: #1f0d07; --input-border: rgba(255,200,100,0.2);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      background: rgba(26,10,5,0.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px;
    }
    .nav-logo { font-weight: 700; font-size: 1.1rem; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-back { color: var(--muted); text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: color 0.2s; }
    .nav-back:hover { color: var(--accent); }

    main { padding: 100px 2rem 60px; max-width: 700px; margin: 0 auto; }
    h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.4rem; }
    .subtitle { color: var(--muted); margin-bottom: 2.5rem; font-size: 0.95rem; }

    .form-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 2rem;
    }

    .form-section { margin-bottom: 2rem; }
    .form-section-title { font-size: 0.78rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 1rem; }

    .field { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--muted); margin-bottom: 0.4rem; }
    input, select, textarea {
      width: 100%; background: var(--input-bg); border: 1px solid var(--input-border);
      color: var(--text); border-radius: 8px; padding: 10px 14px; font-size: 0.9rem;
      font-family: inherit; transition: border-color 0.2s; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    select option { background: var(--input-bg); }

    /* PLAYER ROWS */
    #player-rows { display: flex; flex-direction: column; gap: 0.75rem; }
    .player-row {
      display: grid; grid-template-columns: 1fr 1fr 80px auto; gap: 0.6rem; align-items: end;
    }
    @media(max-width:500px) {
      .player-row { grid-template-columns: 1fr 1fr; }
      .player-row .score-field { grid-column: 1; }
      .player-row .remove-btn { grid-column: 2; justify-self: end; }
    }
    .player-row label { display: none; }
    .remove-btn {
      background: rgba(214,74,42,0.15); border: 1px solid rgba(214,74,42,0.3);
      color: var(--accent2); border-radius: 8px; padding: 10px 14px;
      cursor: pointer; font-size: 1rem; transition: all 0.2s; white-space: nowrap;
    }
    .remove-btn:hover { background: rgba(214,74,42,0.3); }

    #add-player {
      background: transparent; border: 1px dashed var(--input-border);
      color: var(--muted); padding: 10px; border-radius: 8px; cursor: pointer;
      font-size: 0.875rem; font-family: inherit; transition: all 0.2s; width: 100%;
      margin-top: 0.5rem;
    }
    #add-player:hover { border-color: var(--accent); color: var(--accent); }

    /* COLOUR DOTS */
    .color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }

    /* SUBMIT */
    .form-actions { display: flex; gap: 1rem; margin-top: 2rem; }
    .btn-submit {
      flex: 1; background: var(--accent); color: #fff; border: none;
      padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .btn-submit:hover { background: #d4822a; transform: translateY(-1px); }
    .btn-cancel {
      border: 1px solid var(--border); color: var(--muted); background: transparent;
      padding: 14px 20px; border-radius: 8px; font-size: 0.9rem; font-weight: 500;
      cursor: pointer; font-family: inherit; text-decoration: none;
      display: flex; align-items: center; transition: all 0.2s;
    }
    .btn-cancel:hover { color: var(--text); border-color: var(--muted); }

    /* TOAST */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #4ade80; color: #000; font-weight: 700; padding: 12px 28px;
      border-radius: 100px; font-size: 0.9rem; transition: transform 0.3s ease;
      pointer-events: none; z-index: 200;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* HISTORY */
    #history-section { margin-top: 3rem; }
    #history-section h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; }
    .hist-item {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem 1.25rem; margin-bottom: 0.75rem;
      display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;
    }
    .hist-meta { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
    .hist-winner { font-weight: 700; color: var(--accent); font-size: 0.95rem; }
    .hist-scores { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .hist-score { font-size: 0.8rem; background: var(--bg3); padding: 3px 10px; border-radius: 6px; }
    .delete-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1rem; padding: 2px 6px; transition: color 0.2s;
    }
    .delete-btn:hover { color: var(--accent2); }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/ttr/">🚂 Ticket to <span>Ride</span></a>
  <a class="nav-back" href="/ttr/">← Back to TTR Home</a>
</nav>

<main>
  <h1>Log a Game 🎲</h1>
  <p class="subtitle">Record scores and see who reigns supreme on the rails.</p>

  <div class="form-card">
    <form id="game-form">

      <div class="form-section">
        <div class="form-section-title">Game Details</div>
        <div class="field">
          <label for="game-date">Date</label>
          <input type="date" id="game-date" required />
        </div>
        <div class="field">
          <label for="game-map">Map / Edition</label>
          <select id="game-map">
            <option value="">— Select map —</option>
            <option>USA (Original)</option>
            <option>Europe</option>
            <option>Nordic Countries</option>
            <option>Asia</option>
            <option>Africa</option>
            <option>India</option>
            <option>UK & Ireland</option>
            <option>New York</option>
            <option>Amsterdam</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label for="game-notes">Notes (optional)</label>
          <input type="text" id="game-notes" placeholder="e.g. Epic comeback, longest route taken…" />
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">Player Scores</div>
        <div id="player-rows"></div>
        <button type="button" id="add-player">+ Add Player</button>
      </div>

      <div class="form-actions">
        <a href="/ttr/" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-submit">Save Game 🚂</button>
      </div>
    </form>
  </div>

  <div id="history-section">
    <h2>All Logged Games</h2>
    <div id="history-list"></div>
  </div>
</main>

<div class="toast" id="toast">✅ Game saved!</div>

<script>
const COLORS = [
  { name: 'Red',    cls: 'color-red',    dot: '#d64a2a' },
  { name: 'Blue',   cls: 'color-blue',   dot: '#4a7fd6' },
  { name: 'Green',  cls: 'color-green',  dot: '#3da854' },
  { name: 'Yellow', cls: 'color-yellow', dot: '#e8c03c' },
  { name: 'Black',  cls: 'color-black',  dot: '#666' },
  { name: 'Pink',   cls: 'color-pink',   dot: '#d96ba0' },
];

// Set today as default date
document.getElementById('game-date').valueAsDate = new Date();

let playerCount = 0;

function addPlayer(name = '', score = '', colorIdx = null) {
  const row = document.createElement('div');
  row.className = 'player-row';
  const ci = colorIdx !== null ? colorIdx : playerCount % COLORS.length;

  const colorOpts = COLORS.map((c, i) =>
    `<option value="${i}" ${i === ci ? 'selected' : ''} style="color:${c.dot}">${c.name}</option>`
  ).join('');

  row.innerHTML = `
    <div>
      <label>Name</label>
      <input type="text" class="p-name" placeholder="Player name" value="${name}" required />
    </div>
    <div>
      <label>Colour</label>
      <select class="p-color">${colorOpts}</select>
    </div>
    <div class="score-field">
      <label>Score</label>
      <input type="number" class="p-score" placeholder="Score" value="${score}" min="0" required />
    </div>
    <button type="button" class="remove-btn" title="Remove player">✕</button>
  `;
  row.querySelector('.remove-btn').addEventListener('click', () => row.remove());
  document.getElementById('player-rows').appendChild(row);
  playerCount++;
}

document.getElementById('add-player').addEventListener('click', () => addPlayer());

// Start with 2 players
addPlayer('', '', 0);
addPlayer('', '', 1);

function loadGames() {
  try { return JSON.parse(localStorage.getItem('ttr_games') || '[]'); } catch { return []; }
}
function saveGames(g) { localStorage.setItem('ttr_games', JSON.stringify(g)); }

document.getElementById('game-form').addEventListener('submit', e => {
  e.preventDefault();
  const rows = document.querySelectorAll('.player-row');
  const players = [...rows].map(r => ({
    name: r.querySelector('.p-name').value.trim(),
    colorIdx: parseInt(r.querySelector('.p-color').value),
    score: parseInt(r.querySelector('.p-score').value) || 0
  })).filter(p => p.name);

  if (players.length < 2) { alert('Add at least 2 players!'); return; }

  const game = {
    id: Date.now(),
    date: document.getElementById('game-date').value,
    map: document.getElementById('game-map').value,
    notes: document.getElementById('game-notes').value.trim(),
    players
  };

  const games = loadGames();
  games.push(game);
  saveGames(games);

  // Reset form
  document.getElementById('game-notes').value = '';
  document.getElementById('game-map').value = '';
  document.getElementById('player-rows').innerHTML = '';
  playerCount = 0;
  addPlayer('', '', 0);
  addPlayer('', '', 1);

  // Toast
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);

  renderHistory();
});

function renderHistory() {
  const games = loadGames();
  const el = document.getElementById('history-list');
  if (!games.length) { el.innerHTML = '<div style="color:var(--muted);font-size:0.9rem;">No games yet.</div>'; return; }

  el.innerHTML = [...games].reverse().map(g => {
    const sorted = [...g.players].sort((a, b) => b.score - a.score);
    const maxScore = sorted[0].score;
    const winners = sorted.filter(p => p.score === maxScore).map(p => p.name).join(' & ');
    const scoresHtml = sorted.map(p =>
      `<span class="hist-score" style="color:${COLORS[p.colorIdx]?.dot || '#fff'}">${p.name}: ${p.score}</span>`
    ).join('');
    return `
      <div class="hist-item" data-id="${g.id}">
        <div>
          <div class="hist-winner">🏆 ${winners}</div>
          <div class="hist-meta">${g.date}${g.map ? ' · ' + g.map : ''}${g.notes ? ' · ' + g.notes : ''}</div>
          <div class="hist-scores" style="margin-top:6px">${scoresHtml}</div>
        </div>
        <button class="delete-btn" data-id="${g.id}" title="Delete game">🗑️</button>
      </div>`;
  }).join('');

  el.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!confirm('Delete this game?')) return;
      const id = parseInt(btn.dataset.id);
      saveGames(loadGames().filter(g => g.id !== id));
      renderHistory();
    });
  });
}

renderHistory();
</script>
</body>
</html>
